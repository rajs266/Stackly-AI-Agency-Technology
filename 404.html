<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page Not Found — Stackly.">
  <meta name="theme-color" content="#e24c4a">
  <title>404 Page Not Found — Stackly</title>

  <link rel="icon" type="image/webp" href="assets/top-logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Preloader -->
  <div class="preloader">
    <div class="preloader-content">
      <div class="preloader-circle">
        <div class="preloader-ring"></div>
        <img src="assets/logo.webp" alt="Loading..." class="preloader-logo">
      </div>
      <div class="preloader-text">Loading Stackly...</div>
    </div>
  </div>

  <!-- Menu Overlay -->
  <div class="menu-overlay"></div>

  <!-- ═══ 404 Area ═══ -->
  <section class="error-page">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>
    <div class="floating-shape shape-4"></div>
    <div class="floating-shape shape-5"></div>

    <div class="container">
      <div class="error-content reveal-zoom">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="index.html" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Back to Safety</a>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
